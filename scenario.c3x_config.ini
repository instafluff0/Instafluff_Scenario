; Managed by Civ 3 | C3X Modern Configuration Manager
; Mode: scenario

; This controls how many workers the AI feels it needs as a percentage of the base amount. For example, if set to 150 (the default), the AI will build
; about 50% more workers than normal. Set to 100 for base game behavior. For more info, see:
;   https://forums.civfanatics.com/threads/c3x-exe-mod-including-bug-fixes-stack-bombard-and-much-more.666881/page-95#post-16587093
ai_worker_requirement_percent                 = 150
production_perfume                            = ["Semiconductor Foundry": 200%]
show_ai_city_location_desirability_if_settler = false
building_prereqs_for_units                    = ["Factory": "Modern Armor"]
buildings_generating_resources                = ["Spartan Camp": "Mercenaries", "Spartan Camp": "Mercenaries", "Spartan Camp": "Mercenaries", "Venetian Glassworks": "Glassware", "Venetian Glassworks": "Glassware", "Venetian Glassworks": "Glassware", "Singapore Wafer Foundry": "Silicon Wafers", "Singapore Wafer Foundry": "Silicon Wafers", "Singapore Wafer Foundry": "Silicon Wafers", "Dubai Designer Goods": "Designer Goods", "Dubai Designer Goods": "Designer Goods", "Dubai Designer Goods": "Designer Goods", "St. Peter's Basilica": "Religious Relics", "St. Peter's Basilica": "Religious Relics", "St. Peter's Basilica": "Religious Relics", "Semiconductor Foundry": "Silicon Wafers", "Semiconductor Foundry": "Silicon Wafers", "Hollywood": "Films", "Hollywood": "Films", "Hollywood": "Films", "Broadway": "Music", "Broadway": "Music", "Broadway": "Music"]
; Controls the size of the area in which cities can work tiles. The value corresponds to cultural border expansions. For example, setting this to 1
; means cities would only be able to work tiles within their level 1 cultural borders, meaning the eight tiles neighboring the city's own
; tile. Setting to 2 gives you the game's standard rule that cities may work tiles within their level 2 cultural borders, which they attain after one
; expansion. Setting to 3 allows them to work within level 3 borders and so forth.
; Notes: (1) If the city can work tiles in the fourth ring or farther, the map view on the city screen will be zoomed out when you enter it if
; auto_zoom_city_screen_for_large_work_areas is true. Otherwise it's not possible to show the entire work area. You can zoom back in by pressing Z. 
; (2) The next option below can limit cities' workable areas to be smaller than the radius set here, based on their culture. (3) This option has a 
; minimum value of 1 and a maximum of 7.
city_work_radius                              = 2
auto_zoom_city_screen_for_large_work_areas    = true
; Show or hide natural wonders on the map. When disabled, natural wonders will not appear on the map.
enable_natural_wonders                        = false
; If a new scenario is loaded which has no natural wonders defined, add natural wonders.
add_natural_wonders_to_scenarios_if_none      = false
; Districts are Civ6-inspired structures built by workers that enable buildings, provide bonuses, and make cities feel more alive. When enabled,
; districts appear on the map and can be required for certain buildings (configured in default.districts_config.txt). Districts occupy tiles within a
; city's work radius, making those tiles unworkable. They can provide bonuses (food, shields, gold, science, culture, defense) to all cities within
; their work radius. If multiple cities share a district, they can optionally share its buildings and wonders (see options below). Districts with
; pollution or enemy units yield no bonuses. Destroyed districts remove dependent buildings from affected cities unless they have another district of
; that type in range. The five district types below can be enabled independently:
;   enable_districts:                  Enables standard configurable districts (by default: Encampment, Campus, Holy Site, Commercial Hub, Entertainment Complex, Industrial Zone).
;                                      Configured is done in default.districts_config.txt, user.districts_config.txt, and scenario.districts_config.txt
;   enable_neighborhood_districts:     Enables population growth past a configurable limit (see maximum_pop_before_neighborhood_needed below)
;   enable_wonder_districts:           Wonders require a dedicated district tile, making them visible on the map and optionally destructible.
;                                      Configured in default.districts_wonders_config.txt, user.districts_wonders_config.txt, and scenario.districts_wonders_config.txt
;   enable_distribution_hub_districts: Special districts that distribute food/shields from surrounding tiles to all connected cities
;   enable_aerodrome_districts:        Air units can only be built/based at Aerodrome districts instead of cities (if air_units_use_aerodrome_districts_not_cities is true)
;   enable_port_districts:             Enables Port districts, which serve as coastal district tiles for naval production/basing when naval_units_use_port_districts_not_cities is on.
;   enable_bridge_districts:           Enables Bridge districts on coastal water; completed bridges let land units cross water tiles.
;   enable_canal_districts:            Enables Canal districts on land; completed canals let naval units traverse land tiles between water bodies.
;   enable_central_rail_hub_districts: Enables Central Rail Hub districts used for rail-era infrastructure (e.g., Mass Transit).
;   enable_energy_grid_districts:      Enables Energy Grid districts associated with power plant infrastructure.
;   enable_great_wall_districts:       Enables Great Wall districts (wall-like tiles that can block others if great_wall_districts_impassable_by_others is on).
enable_districts                              = false
enable_neighborhood_districts                 = false
enable_wonder_districts                       = false
enable_distribution_hub_districts             = false
enable_aerodrome_districts                    = false
enable_port_districts                         = false
enable_bridge_districts                       = false
enable_canal_districts                        = false
enable_central_rail_hub_districts             = false
enable_energy_grid_districts                  = false
enable_great_wall_districts                   = false
; Great Wall behavior:
;   disable_great_wall_city_defense_bonus:     Disables the Great Wall wonder's city defense doubling effect. Only takes effect if districts and great wall districts are enabled.
;   great_wall_districts_impassable_by_others: Great Wall district tiles block movement by other civs (unless obsolete).
;   auto_build_great_wall_around_territory:    Auto-place Great Wall districts along your borders when the specified wonder is built.
;   great_wall_auto_build_wonder_name:         Name of the wonder that triggers auto-building (empty disables auto-build).
;   ai_auto_build_great_wall_strategy:         How AI uses auto-built Great Wall: all-borders (any border tiles) or other-civ-bordered-only (only borders touching another civ).
disable_great_wall_city_defense_bonus         = false
